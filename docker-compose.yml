# ─── Development ──────────────────────────────────────────────────────────
# Standalone dev environment. No external dependencies (no milk_network, etc.).
# Run with:  docker compose --env-file .env.dev up -d
# The --env-file is required so ${ZO_ROOT_USER_EMAIL} and other vars
# in the environment: blocks resolve correctly.
# ───────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cookd
      POSTGRES_PASSWORD: cookd
      POSTGRES_DB: cookd
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./backend/docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookd"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Init: auto-create dashboards on first start ───────────────────────
  # Runs setup_dashboards.py once when OpenObserver is ready.
  # Uses lightweight python:3.12-slim directly — no need to build the
  # full app image (setup_dashboards.py only uses stdlib).
  # Starts in parallel with api (api does not depend on dashboards).
  init-dashboards:
    image: python:3.12-slim
    command: python backend/docker/observability/setup_dashboards.py
    environment:
      - ZO_ROOT_USER_EMAIL=${ZO_ROOT_USER_EMAIL}
      - ZO_ROOT_USER_PASSWORD=${ZO_ROOT_USER_PASSWORD}
      - OPENOBSERVER_URL=http://openobserver:5001
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      openobserver:
        condition: service_started
    restart: on-failure:3

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:create_app --factory --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env.dev
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      openobserver:
        condition: service_started
    restart: unless-stopped

  # ── Landing Page (Next.js) ─────────────────────────────────────────────
  landing-page:
    build:
      context: ./landing-page
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      # Clerk auth — set NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY and CLERK_SECRET_KEY in .env.dev
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      # Admin BFF — shared secret with backend
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - BACKEND_URL=http://api:8000
    volumes:
      - ./landing-page:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

  # OpenObserver (unified observability: logs, metrics, traces)
  # Access at http://localhost:5001
  # All config values read from .env.dev (ZO_ROOT_USER_EMAIL, ZO_ROOT_USER_PASSWORD,
  # ZO_POSTGRES_DSN, ZO_DATA_DIR).
  openobserver:
    image: public.ecr.aws/zinclabs/openobserve:latest
    ports:
      - "5001:5001"
    environment:
      - ZO_ROOT_USER_EMAIL=${ZO_ROOT_USER_EMAIL}
      - ZO_ROOT_USER_PASSWORD=${ZO_ROOT_USER_PASSWORD}
      - ZO_POSTGRES_DSN=${ZO_POSTGRES_DSN}
      - ZO_DATA_DIR=${ZO_DATA_DIR:-/data}
      - ZO_HTTP_PORT=5001
    volumes:
      - ./backend/docker/openobserver/config.yaml:/config.yaml
      - openobserver_data_dev:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata_dev:
  openobserver_data_dev:
