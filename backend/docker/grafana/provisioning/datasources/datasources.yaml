apiVersion: 1
datasources:
  # Stable UID for provisioning. If Logs Drilldown / Explore shows "Unable to load datasource meta data",
  # an old browser URL may still use a previous UID (e.g. var-ds=P8E80…): pick Loki again in the UI or open
  # the app from the menu so the datasource selector refreshes.
  - name: Loki
    uid: bubble-chat-loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 1000
