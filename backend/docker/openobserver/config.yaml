# NOTE: the zinclabs/openobserve binary is configured entirely via ZO_*
# env vars (see docker-compose*.yml) and does not read a mounted config
# file — nothing in this file is actually consumed by the container.
# Real OTLP ingestion paths are fixed by the binary: /api/{org}/v1/{traces,metrics,logs}.
# Kept here only as documentation of intended defaults.

server:
  http_listen_port: 5001
  grpc_listen_port: 5002

# Storage configuration
storage:
  # Database for metadata (users, dashboards, stream schemas, saved searches).
  #   Dev:  SQLite  (default) — no external dependencies, data in /data/openobserver.db
  #   Prod: Postgres — set ZO_META_STORE=postgres and ZO_META_POSTGRES_DSN env vars.
  #         Example: ZO_META_POSTGRES_DSN=postgres://cookd:cookd@postgres:5432/openobserver
  sqlite_path: /data/openobserver.db
  # Data retention in days for observability data (logs, traces, metrics)
  retention_days: 30

# Security
auth:
  # Header name for API key authentication (used for OTLP ingestion).
  # The API key value is set via ZO_ROOT_USER_EMAIL / ZO_ROOT_USER_PASSWORD
  # on first startup, then created in Settings → API Keys.
  api_key_header: "Authorization"
