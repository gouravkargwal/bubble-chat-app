# Loki 3.5+ single-binary (Grafana Logs Drilldown JSON viewer needs Loki ≥ 3.5 per Grafana docs).
# Filesystem store, schema v11 boltdb-shipper.
# `allow_structured_metadata: false` keeps this config valid without migrating to TSDB/schema v13.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /tmp/loki
  storage:
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory: /tmp/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# Grafana 11: Logs Drilldown needs volume + detected_labels APIs (Loki 3+). Loki 2.9 had no /detected_labels → Grafana 404.
limits_config:
  volume_enabled: true
  allow_structured_metadata: false

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h
