# Variable substitution (${VAR}) only reads the default `.env` file in this directory — not `.env.prod`.
# Services below use `env_file: .env.prod` for runtime env; Grafana's password is read the same way
# (set GF_SECURITY_ADMIN_PASSWORD in .env.prod — no ${...} here, so `compose build` works without --env-file).
#
# If you still use ${VAR} elsewhere, run: docker compose --env-file .env.prod -f docker-compose.prod.yml <cmd>

services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env.prod # <--- Read everything from here!
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cookd}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000 --workers 4 --timeout-keep-alive 30
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      logging: promtail
    networks:
      - default # Needed to talk to Postgres
      - milk_bridge # Needed to talk to the existing milk network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx; httpx.get('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Logs → Loki (Promtail tails Docker logs for containers labeled logging=promtail)
  loki:
    image: grafana/loki:3.5.0
    # Named volumes are root-owned; default Loki user cannot mkdir ruler paths under /tmp/loki.
    user: "0:0"
    volumes:
      - ./docker/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:3110:3100"
    restart: unless-stopped
    networks:
      - default

  promtail:
    image: grafana/promtail:3.5.0
    volumes:
      - ./docker/promtail-config.yaml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped
    networks:
      - default

  grafana:
    image: grafana/grafana:11.3.0
    env_file: .env.prod
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3333:3000"
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped
    networks:
      default:
      milk_bridge:
        # Same network as Nginx Proxy Manager — without this, NPM gets 502 (no route to Grafana).
        aliases:
          - bubble-grafana

volumes:
  pgdata_prod:
  loki_data:
  grafana_data:
  promtail_positions:

networks:
  milk_bridge:
    external: true
    name: milk-management-system_milk_network
