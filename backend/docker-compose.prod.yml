# ─── Production ────────────────────────────────────────────────────────────
# Variable substitution (${VAR}) only reads the default `.env` file in this
# directory — not `.env.prod`. Services below use `env_file: .env.prod` for
# runtime env (set OPENOBSERVER_API_KEY + ZO_ROOT_USER_* in .env.prod).
#
# If you still use ${VAR} elsewhere, run:
#   docker compose --env-file .env.prod -f docker-compose.prod.yml <cmd>
# ───────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env.prod
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cookd}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - default
      - milk_bridge

  # ── Init: auto-create dashboards on first start ───────────────────────
  # Runs setup_dashboards.py once when OpenObserver is ready.
  # Retries up to 3 times if OO is still starting, then stops.
  init-dashboards:
    build: .
    command: python docker/observability/setup_dashboards.py
    env_file: .env.prod
    depends_on:
      openobserver:
        condition: service_started
    restart: on-failure:3
    networks:
      - default
      - milk_bridge

  api:
    build: .
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000 --workers 4 --timeout-keep-alive 30
    env_file: .env.prod
    volumes:
      - ./oci:/app/oci:ro
    depends_on:
      postgres:
        condition: service_healthy
      openobserver:
        condition: service_started
      init-dashboards:
        condition: service_completed_successfully
    networks:
      - default
      - milk_bridge
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx; httpx.get('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # OpenObserver (unified observability: logs, metrics, traces)
  # Access at http://localhost:5001
  # ── Production configuration ────────────────────────────────────────────
  #   Database: Uses Postgres for metadata (set ZO_POSTGRES_DSN in .env.prod).
  #             Falls back to SQLite if ZO_POSTGRES_DSN is unset.
  #   Auth:     ZO_ROOT_USER_EMAIL + ZO_ROOT_USER_PASSWORD create the admin
  #             account on first startup. After that, create API keys in the UI
  #             at Settings → API Keys and set OPENOBSERVER_API_KEY in .env.prod.
  #   Storage:  Observability data stored internally (columnar), not in SQLite
  #             or Postgres. Only metadata (users, dashboards, streams) goes
  #             to the configured database.
  # ─────────────────────────────────────────────────────────────────────────
  openobserver:
    image: public.ecr.aws/zinclabs/openobserve:latest
    env_file: .env.prod
    environment:
      - ZO_ROOT_USER_EMAIL=${ZO_ROOT_USER_EMAIL}
      - ZO_ROOT_USER_PASSWORD=${ZO_ROOT_USER_PASSWORD}
      - ZO_POSTGRES_DSN=${ZO_POSTGRES_DSN}
      - ZO_DATA_DIR=/data
      - ZO_HTTP_PORT=5001
    volumes:
      - ./docker/openobserver/config.yaml:/config.yaml
      - openobserver_data:/data
    ports:
      - "127.0.0.1:5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - milk_bridge

volumes:
  pgdata_prod:
  openobserver_data:

networks:
  milk_bridge:
    external: true
    name: milk-management-system_milk_network
