services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cookd
      POSTGRES_PASSWORD: cookd
      POSTGRES_DB: cookd
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookd"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: uvicorn app.main:create_app --factory --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env.dev
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    labels:
      logging: promtail

  # Observability (host ports): Loki http://localhost:3110  Grafana http://localhost:3333
  loki:
    # 3.5.0 logs noisy false-positive "negative structured metadata bytes received".
    # Use patched 3.5.1+.
    image: grafana/loki:3.5.1
    # Named volumes are root-owned; the image’s default user (10001) cannot create rules/ under /tmp/loki.
    user: "0:0"
    volumes:
      - ./docker/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data_dev:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3110:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.5.1
    volumes:
      - ./docker/promtail-config.yaml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions_dev:/tmp
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - grafana_data_dev:/var/lib/grafana
    ports:
      - "3333:3000"
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata_dev:
  loki_data_dev:
  grafana_data_dev:
  promtail_positions_dev:
