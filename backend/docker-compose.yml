services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cookd
      POSTGRES_PASSWORD: cookd
      POSTGRES_DB: cookd
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookd"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: uvicorn app.main:create_app --factory --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env.dev
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata_dev:
