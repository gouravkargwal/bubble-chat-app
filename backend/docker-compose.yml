# ─── Dev ─────────────────────────────────────────────────────────────────
# Run with:  docker compose --env-file .env.dev up -d
# The --env-file is required so ${ZO_ROOT_USER_EMAIL} and other vars
# in the environment: blocks resolve correctly.
# ───────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cookd
      POSTGRES_PASSWORD: cookd
      POSTGRES_DB: cookd
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookd"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Init: auto-create dashboards on first start ───────────────────────
  # Runs setup_dashboards.py once when OpenObserver is ready.
  # If it fails (e.g. OO not ready yet), Docker retries up to 3 times then stops.
  init-dashboards:
    build: .
    command: python docker/observability/setup_dashboards.py
    environment:
      - ZO_ROOT_USER_EMAIL=${ZO_ROOT_USER_EMAIL}
      - ZO_ROOT_USER_PASSWORD=${ZO_ROOT_USER_PASSWORD}
      - OPENOBSERVER_URL=http://openobserver:5001
    volumes:
      - .:/app
    depends_on:
      openobserver:
        condition: service_started
    restart: on-failure:3

  api:
    build: .
    command: uvicorn app.main:create_app --factory --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env.dev
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      openobserver:
        condition: service_started
      init-dashboards:
        condition: service_completed_successfully
    restart: unless-stopped

  # OpenObserver (unified observability: logs, metrics, traces)
  # Access at http://localhost:5001
  # All config values read from .env.dev (ZO_ROOT_USER_EMAIL, ZO_ROOT_USER_PASSWORD,
  # ZO_POSTGRES_DSN, ZO_DATA_DIR).
  openobserver:
    image: public.ecr.aws/zinclabs/openobserve:latest
    ports:
      - "5001:5001"
    environment:
      - ZO_ROOT_USER_EMAIL=${ZO_ROOT_USER_EMAIL}
      - ZO_ROOT_USER_PASSWORD=${ZO_ROOT_USER_PASSWORD}
      - ZO_POSTGRES_DSN=${ZO_POSTGRES_DSN}
      - ZO_DATA_DIR=${ZO_DATA_DIR:-/data}
      - ZO_HTTP_PORT=5001
    volumes:
      - ./docker/openobserver/config.yaml:/config.yaml
      - openobserver_data_dev:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata_dev:
  openobserver_data_dev:
