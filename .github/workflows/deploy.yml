name: Deploy to Production

on:
  push:
    branches: [main]

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Docker Stack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 140.245.224.228
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /home/ubuntu/bubble-chat-app

            # Pull latest code
            git pull origin main

            # Rebuild changed images and restart containers
            # --pull fetches latest base images (security updates)
            docker compose -f docker-compose.prod.yml up -d --build --pull always

            # Prune unused images (don't let the disk fill up)
            docker image prune -f --filter "until=24h"

            echo "✅ Deploy complete: $(date)"
