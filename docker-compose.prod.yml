# ─── Production ────────────────────────────────────────────────────────────
# Run with:
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
#
# All services read their env vars from .env.prod via `env_file:`.
# The `--env-file` flag is only needed for Compose variable substitution
# (e.g. ${POSTGRES_USER:-cookd} in healthcheck commands).
# ───────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env.prod
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./backend/docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cookd}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 6G
        reservations:
          cpus: "1"
          memory: 4G
    mem_limit: 6g
    mem_reservation: 4g
    cpus: "2"

  # ── Init: auto-create dashboards on first start ───────────────────────
  # Runs setup_dashboards.py once when OpenObserver is ready.
  # Uses lightweight python:3.12-slim directly — no need to build the
  # full app image (setup_dashboards.py only uses stdlib).
  # Starts in parallel with api (api does not depend on dashboards).
  init-dashboards:
    image: python:3.12-slim
    command: python backend/docker/observability/setup_dashboards.py
    env_file: .env.prod
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      openobserver:
        condition: service_started
    restart: on-failure:3

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000 --workers 4 --timeout-keep-alive 30
    env_file: .env.prod
    volumes:
      - ./backend/oci:/app/oci:ro
      - rendered_videos_data:/rendered-videos
    depends_on:
      postgres:
        condition: service_healthy
      openobserver:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx; httpx.get('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.5"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G
    mem_limit: 4g
    mem_reservation: 2g
    cpus: "2.5"

  # ── Landing Page (Next.js) ─────────────────────────────────────────────
  landing-page:
    build:
      context: ./landing-page
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Clerk auth — set these in .env.prod
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      # Admin BFF — shared secret with backend
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - BACKEND_URL=http://api:8000
    volumes:
      - rendered_videos_data:/rendered-videos
    env_file: .env.prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    mem_limit: 1g
    mem_reservation: 512m
    cpus: "1"

  # ── Nginx Proxy Manager ────────────────────────────────────────────────
  # Web UI for managing reverse proxies and Let's Encrypt SSL certificates.
  # Access admin at http://localhost:81 (SSH tunnel required for remote servers).
  # Default login: admin@example.com / changeme
  #   → CHANGE THIS IMMEDIATELY after first login!
  #
  # To proxy the API service, add a Proxy Host in the NPM admin UI:
  #   Domain: api.yourdomain.com
  #   Forward Hostname: api
  #   Forward Port: 8000
  #   Then enable SSL → Request a new SSL certificate → Force SSL.
  #
  # Ports:
  #   80    — HTTP (public, for ACME HTTP-01 challenge & redirect to HTTPS)
  #   443   — HTTPS (public, SSL traffic)
  #   81    — Admin panel (bind to 127.0.0.1 in production, SSH tunnel only)
  # ─────────────────────────────────────────────────────────────────────────
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      # Public: HTTP + HTTPS
      - "80:80"
      - "443:443"
      # Admin UI — accessible via VM IP (change default creds immediately!)
      - "81:81"
    volumes:
      - npm_data:/data
      - npm_ssl:/etc/letsencrypt
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "0.5"

  # OpenObserver (unified observability: logs, metrics, traces)
  # Access at http://localhost:5001
  # ── Production configuration ────────────────────────────────────────────
  #   All env vars are loaded from .env.prod via env_file above.
  #   Database: Uses Postgres for metadata (set ZO_META_STORE=postgres and
  #             ZO_META_POSTGRES_DSN in .env.prod).
  #   Auth:     ZO_ROOT_USER_EMAIL + ZO_ROOT_USER_PASSWORD create the admin
  #             account on first startup. After that, create API keys in the UI
  #             at Settings → API Keys and set OPENOBSERVER_API_KEY in .env.prod.
  #   Storage:  Observability data stored internally (columnar), not in SQLite
  #             or Postgres. Only metadata goes to the configured database.
  # ─────────────────────────────────────────────────────────────────────────
  openobserver:
    image: public.ecr.aws/zinclabs/openobserve:latest
    env_file: .env.prod
    environment:
      - ZO_DATA_DIR=/data
      - ZO_HTTP_PORT=5001
    volumes:
      - ./backend/docker/openobserver/config.yaml:/config.yaml
      - openobserver_data:/data
    ports:
      - "127.0.0.1:5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 2G
    mem_limit: 4g
    mem_reservation: 2g
    cpus: "1.5"

volumes:
  pgdata_prod:
  openobserver_data:
  npm_data:
  npm_ssl:
  rendered_videos_data:
